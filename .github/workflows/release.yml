name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      skip-python:
        description: "Skip Python env preparation (use cached)"
        required: false
        type: boolean
        default: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Gate: validate tag and create draft release (tag pushes only) ──
  release-gate:
    name: Release Gate
    if: github.repository == 'Lightricks/ltx-desktop' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate tag ↔ package.json
        id: version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./ltx-video/package.json').version")
          echo "Tag: $TAG_VERSION | package.json: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Version mismatch: tag=$TAG_VERSION package.json=$PKG_VERSION"
            exit 1
          fi
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$TAG_VERSION" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ steps.version.outputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "${{ github.ref_name }}" \
            --draft \
            --title "LTX Desktop ${{ steps.version.outputs.version }}" \
            --generate-notes \
            $PRERELEASE_FLAG

  # ── Build: matrix across macOS + Windows ───────────────────────────
  build:
    name: Build (${{ matrix.os }})
    needs: release-gate
    if: >-
      github.repository == 'Lightricks/ltx-desktop' &&
      always() && (needs.release-gate.result == 'success' || needs.release-gate.result == 'skipped')
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
      id-token: write  # Required for GCP Workload Identity Federation
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos
            runner: macos-latest
          - os: windows
            runner: windows-latest
    defaults:
      run:
        working-directory: ltx-video
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ltx-video/package-lock.json

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      # Cache the python-embed directory to skip ~30 min preparation
      - name: Cache python-embed
        uses: actions/cache@v4
        with:
          path: ltx-video/python-embed
          key: python-embed-${{ runner.os }}-${{ hashFiles('ltx-video/backend/.python-version', 'ltx-video/backend/uv.lock', format('ltx-video/scripts/prepare-python.{0}', matrix.os == 'windows' && 'ps1' || 'sh')) }}

      # Generate python deps hash (includes Python version + locked deps)
      - name: Generate python deps hash (macOS)
        if: matrix.os == 'macos'
        run: cat backend/.python-version backend/uv.lock | shasum -a 256 | cut -d' ' -f1 > python-deps-hash.txt

      - name: Generate python deps hash (Windows)
        if: matrix.os == 'windows'
        shell: bash
        run: cat backend/.python-version backend/uv.lock | sha256sum | cut -d' ' -f1 > python-deps-hash.txt

      # ── Stage 1: Build app (no signing secrets in environment) ────

      - name: Install npm dependencies
        run: npm ci

      - name: Build app (macOS)
        if: matrix.os == 'macos'
        run: bash scripts/build-app.sh --platform mac --skip-npm

      - name: Build app (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: scripts/build-app.ps1 -SkipNpm

      # Download VC++ Redistributable for the Windows NSIS installer
      - name: Download VC++ Redistributable (Windows)
        if: matrix.os == 'windows'
        shell: bash
        run: |
          curl -fSL -o resources/vc_redist.x64.exe \
            "https://aka.ms/vs/17/release/vc_redist.x64.exe"
          ls -lh resources/vc_redist.x64.exe

      # ── Stage 2: Package installer (signing secrets available) ───
      # Only electron-builder runs here — the only step that needs
      # access to code-signing certificates and notarization credentials.

      # Configure macOS signing + notarization env vars (tagged releases only).
      # CSC_LINK must NOT be set (even to empty string) on non-release builds —
      # electron-builder treats any value as a file path.
      - name: Configure macOS signing (release only)
        if: matrix.os == 'macos' && startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "CSC_LINK=${_CSC_LINK}"                                       >> "$GITHUB_ENV"
          echo "CSC_KEY_PASSWORD=${_CSC_KEY_PASSWORD}"                       >> "$GITHUB_ENV"
          echo "APPLE_API_KEY_ID=${_APPLE_API_KEY_ID}"                       >> "$GITHUB_ENV"
          echo "APPLE_API_ISSUER=${_APPLE_API_ISSUER}"                       >> "$GITHUB_ENV"

          # Write API key .p8 to temp file if provided
          if [ -n "$_APPLE_API_KEY_CONTENT" ]; then
            APPLE_API_KEY="$RUNNER_TEMP/AuthKey.p8"
            printf '%s\n' "$_APPLE_API_KEY_CONTENT" > "$APPLE_API_KEY"
            echo "APPLE_API_KEY=$APPLE_API_KEY" >> "$GITHUB_ENV"
          fi
        env:
          _CSC_LINK: ${{ secrets.MAC_CERTIFICATE }}
          _CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          _APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY }}
          _APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          _APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

      - name: Package installer (macOS)
        if: matrix.os == 'macos'
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            PUBLISH="--publish always"
          else
            PUBLISH="--publish never"
          fi
          bash scripts/package-installer.sh --platform mac $PUBLISH

          # Clean up API key
          [ -n "${APPLE_API_KEY:-}" ] && rm -f "$APPLE_API_KEY" || true

      - name: Package installer (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          if ("${{ github.ref }}".StartsWith("refs/tags/v")) {
            scripts/package-installer.ps1 -Publish always
          } else {
            scripts/package-installer.ps1 -Publish never
          }
        # env:
          # Uncomment when code signing certificates are configured:
          # CSC_LINK: ${{ secrets.WIN_CERTIFICATE }}
          # CSC_KEY_PASSWORD: ${{ secrets.WIN_CERTIFICATE_PASSWORD }}

      # Create, split, and upload python-embed archive (Windows only)
      # GitHub Releases has a 2 GB per-asset limit; the archive exceeds that.
      - name: Create and split python-embed archive (Windows)
        if: matrix.os == 'windows'
        shell: bash
        run: |
          cp python-deps-hash.txt python-embed/deps-hash.txt
          tar -czf python-embed-win32.tar.gz -C . python-embed

          # Split into <1.9 GB parts (leaves headroom under the 2 GB limit)
          split -b 1900m python-embed-win32.tar.gz python-embed-win32.tar.gz.part-

          # Build a manifest so the client knows what to download
          echo '{"parts":[' > python-embed-win32.manifest.json
          FIRST=1
          for part in python-embed-win32.tar.gz.part-*; do
            SIZE=$(stat -c%s "$part" 2>/dev/null || stat -f%z "$part")
            if [ "$FIRST" -eq 0 ]; then echo ',' >> python-embed-win32.manifest.json; fi
            FIRST=0
            echo "{\"name\":\"$(basename "$part")\",\"size\":$SIZE}" >> python-embed-win32.manifest.json
          done
          TOTAL=$(stat -c%s python-embed-win32.tar.gz 2>/dev/null || stat -f%z python-embed-win32.tar.gz)
          echo "],\"totalSize\":$TOTAL}" >> python-embed-win32.manifest.json

          echo "Manifest:"
          cat python-embed-win32.manifest.json
          echo ""
          ls -lh python-embed-win32.tar.gz.part-*

      # Upload python-embed to GCS bucket (every Windows build, not just releases).
      # This serves as the CDN fallback when the GitHub Release doesn't exist yet.
      - name: Authenticate to GCP (Windows)
        if: matrix.os == 'windows'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/361900799277/locations/global/workloadIdentityPools/push-docker-images/providers/github
          service_account: ltx-desktop-ci@ltx-vl-web-prd.iam.gserviceaccount.com

      - name: Set up gcloud CLI (Windows)
        if: matrix.os == 'windows'
        uses: google-github-actions/setup-gcloud@v2

      - name: Upload python-embed to GCS (Windows)
        if: matrix.os == 'windows'
        shell: bash
        run: |
          DEPS_HASH=$(cat python-deps-hash.txt)
          DEST="gs://ltx-desktop-artifacts/python-embed-win32/${DEPS_HASH}/python-embed-win32.tar.gz"
          CLOUDSDK_STORAGE_PARALLEL_COMPOSITE_UPLOAD_ENABLED=True \
            gcloud storage cp --no-clobber python-embed-win32.tar.gz "${DEST}"

      - name: Upload python-embed to release (Windows)
        if: matrix.os == 'windows' && startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ github.ref_name }}" python-deps-hash.txt --clobber
          gh release upload "${{ github.ref_name }}" python-embed-win32.manifest.json --clobber
          for part in python-embed-win32.tar.gz.part-*; do
            gh release upload "${{ github.ref_name }}" "$part" --clobber
          done

      - name: Upload python-embed artifact (Windows)
        if: matrix.os == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: python-embed-windows
          path: |
            ltx-video/python-embed-win32.manifest.json
            ltx-video/python-embed-win32.tar.gz.part-*
          retention-days: 7

      # Upload installer files to GCS (tagged releases only)
      - name: Authenticate to GCP (macOS)
        if: matrix.os == 'macos' && startsWith(github.ref, 'refs/tags/v')
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/361900799277/locations/global/workloadIdentityPools/push-docker-images/providers/github
          service_account: ltx-desktop-ci@ltx-vl-web-prd.iam.gserviceaccount.com

      - name: Set up gcloud CLI (macOS)
        if: matrix.os == 'macos' && startsWith(github.ref, 'refs/tags/v')
        uses: google-github-actions/setup-gcloud@v2

      - name: Upload installer to GCS (macOS)
        if: matrix.os == 'macos' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          DEST="gs://ltx-desktop-artifacts/releases/${TAG}"
          for f in release/*.dmg; do
            echo "Uploading $(basename "$f") → ${DEST}/"
            gcloud storage cp "$f" "${DEST}/$(basename "$f")"
          done

      - name: Upload installer to GCS (Windows)
        if: matrix.os == 'windows' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          DEST="gs://ltx-desktop-artifacts/releases/${TAG}"
          for f in release/*Setup*.exe; do
            echo "Uploading $(basename "$f") → ${DEST}/"
            gcloud storage cp "$f" "${DEST}/$(basename "$f")"
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: |
            ltx-video/release/*.dmg
            ltx-video/release/*Setup*.exe
            ltx-video/release/*.blockmap
            ltx-video/release/*.yml
          if-no-files-found: error
          retention-days: 7

  # ── Finalize: un-draft the release (tag pushes only) ───────────────
  finalize:
    name: Finalize Release
    if: github.repository == 'Lightricks/ltx-desktop' && startsWith(github.ref, 'refs/tags/v')
    needs: [release-gate, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # To require manual approval before going live, uncomment:
    # environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Verify release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Checking assets on draft release ${{ github.ref_name }}..."
          ASSETS=$(gh release view "${{ github.ref_name }}" --json assets --jq '.assets[].name')
          echo "Assets found:"
          echo "$ASSETS"
          echo ""

          # Verify we have the expected files
          MISSING=0
          for pattern in ".dmg" "Setup.exe" "latest-mac.yml" "latest.yml" "python-embed-win32.manifest.json" "python-embed-win32.tar.gz.part-"; do
            if echo "$ASSETS" | grep -q "$pattern"; then
              echo "✓ Found $pattern"
            else
              echo "✗ Missing $pattern"
              MISSING=1
            fi
          done

          if [ "$MISSING" -eq 1 ]; then
            echo ""
            echo "::warning::Some expected assets are missing. Review the draft release before un-drafting."
          fi

      - name: Un-draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ needs.release-gate.outputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          else
            PRERELEASE_FLAG="--latest"
          fi
          gh release edit "${{ github.ref_name }}" \
            --draft=false \
            $PRERELEASE_FLAG
          echo "Release ${{ github.ref_name }} is now live!"
