name: PR Slack Notification

# Sends a Slack message whenever a PR targeting main is opened, updated, or edited.
#
# Setup:
#   1. Create a Slack Incoming Webhook at https://api.slack.com/apps
#   2. Add it as a repo secret named SLACK_WEBHOOK_URL
#      (Settings → Secrets and variables → Actions → New repository secret)

on:
  pull_request:
    types: [opened, reopened, synchronize, edited]
    branches: [main]

jobs:
  notify:
    name: Notify Slack
    runs-on: ubuntu-latest
    steps:
      - name: Send PR notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PR_TITLE:      ${{ github.event.pull_request.title }}
          PR_NUMBER:     ${{ github.event.pull_request.number }}
          PR_URL:        ${{ github.event.pull_request.html_url }}
          PR_BODY:       ${{ github.event.pull_request.body }}
          BRANCH_NAME:   ${{ github.event.pull_request.head.ref }}
          REPO_URL:      ${{ github.event.pull_request.head.repo.html_url }}
          AUTHOR:        ${{ github.event.pull_request.user.login }}
          BASE_BRANCH:   ${{ github.event.pull_request.base.ref }}
          CHANGED_FILES: ${{ github.event.pull_request.changed_files }}
          ADDITIONS:     ${{ github.event.pull_request.additions }}
          DELETIONS:     ${{ github.event.pull_request.deletions }}
        run: python3 .github/scripts/slack_notify.py
